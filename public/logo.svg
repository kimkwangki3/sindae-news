<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 88" role="img" aria-label="신대신문">
  <!-- 말풍선형 신문 아이콘 -->
  <g fill="none" stroke="#C77B8B" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <rect x="10" y="10" width="66" height="58" rx="14"/>
    <path d="M30 68 L30 80 L44 68" fill="#C77B8B" stroke="none"/>
  </g>
  <!-- 신문 내부: 사진 박스 + 기사 줄 -->
