  <g stroke="#C77B8B" stroke-width="4.5" stroke-linecap="round">
    <line x1="46" y1="26" x2="64" y2="26"/>
    <line x1="46" y1="33" x2="64" y2="33"/>
    <line x1="22" y1="46" x2="64" y2="46"/>
    <line x1="22" y1="54" x2="64" y2="54"/>
  </g>
  <!-- 워드마크 -->
  <text x="96" y="60" font-family="'Gowun Dodum','Noto Sans KR','Apple SD Gothic Neo',sans-serif"
